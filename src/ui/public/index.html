<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=800, initial-scale=1.0">
  <title>homepi</title>
  <link rel="stylesheet" href="style.css">
  <!-- app.js must execute before Alpine so app() is defined when Alpine initializes -->
  <script src="app.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.3/dist/cdn.min.js"></script>
</head>
<body x-data="app()" x-init="init()">

  <!-- ── Main tabs ─────────────────────────────────────────────────────────── -->
  <main class="tab-content">

    <!-- Home tab -->
    <section x-show="tab === 'home'" class="screen-home">
      <div class="home-top">
        <div class="clock-block">
          <div class="clock" x-text="clock"></div>
          <div class="date" x-text="date"></div>
        </div>
        <div class="presence-dots">
          <template x-for="p in people" :key="p.name">
            <div class="person-dot" :class="p.state">
              <span class="dot-indicator"></span>
              <span class="dot-name" x-text="p.name"></span>
            </div>
          </template>
        </div>
      </div>

      <div class="quick-tiles">
        <template x-for="tile in topCommands" :key="tile.device + tile.command">
          <button class="quick-tile" @click="sendCommand(`${tile.command} the ${tile.device}`)">
            <span class="tile-cmd" x-text="tile.command"></span>
            <span class="tile-dev" x-text="tile.device"></span>
          </button>
        </template>
        <template x-if="topCommands.length === 0">
          <div class="no-tiles">Use Discord to control devices — shortcuts appear here</div>
        </template>
      </div>

      <!-- Live message feed -->
      <div class="message-feed">
        <template x-for="msg in messages.slice(-4)" :key="msg.id">
          <div class="feed-item" x-text="msg.text"></div>
        </template>
      </div>
    </section>

    <!-- Devices tab -->
    <section x-show="tab === 'devices'" class="screen-devices" x-init="tab === 'devices' && refreshDevices()">

      <!-- Room tabs -->
      <div class="room-tabs">
        <button class="room-tab" :class="{ active: deviceRoom === null }" @click="deviceRoom = null">All</button>
        <template x-for="room in deviceRooms" :key="room">
          <button class="room-tab" :class="{ active: deviceRoom === room }" @click="deviceRoom = room" x-text="room"></button>
        </template>
      </div>

      <!-- Device grid -->
      <div class="device-grid">
        <template x-for="dev in filteredDevices" :key="dev.name">
          <div class="device-card">
            <div class="dev-header">
              <span class="dev-name" x-text="dev.name"></span>
              <span class="dev-room" x-text="dev.room ?? ''"></span>
            </div>

            <!-- climate.* -->
            <template x-if="dev.domain === 'climate'">
              <div class="widget-climate">
                <div class="climate-temp">
                  <span class="temp-val" x-text="dev.haState?.attributes?.current_temperature ?? '—'"></span>
                  <span class="temp-unit">°C</span>
                </div>
                <div class="temp-controls">
                  <button class="ctrl-btn" @click="cmd(dev, 'set ac to ' + ((dev.haState?.attributes?.temperature ?? 22) - 1) + ' degrees')">−</button>
                  <span class="temp-target" x-text="(dev.haState?.attributes?.temperature ?? '—') + '°'"></span>
                  <button class="ctrl-btn" @click="cmd(dev, 'set ac to ' + ((dev.haState?.attributes?.temperature ?? 22) + 1) + ' degrees')">+</button>
                </div>
                <div class="mode-chips">
                  <template x-for="mode in ['cool','heat','auto','off']" :key="mode">
                    <button class="mode-chip"
                      :class="{ active: dev.haState?.state === mode || (mode === 'off' && dev.haState?.state === 'off') }"
                      @click="cmd(dev, mode === 'off' ? 'turn off the ' + dev.name : 'set ' + dev.name + ' to ' + mode + ' mode')"
                      x-text="mode"></button>
                  </template>
                </div>
              </div>
            </template>

            <!-- media_player.* -->
            <template x-if="dev.domain === 'media_player'">
              <div class="widget-row">
                <button class="ctrl-btn" @click="cmd(dev, 'turn ' + (dev.haState?.state === 'on' || dev.haState?.state === 'playing' ? 'off' : 'on') + ' the ' + dev.name)">
                  <span x-text="(dev.haState?.state === 'on' || dev.haState?.state === 'playing') ? '⏻ On' : '⏻ Off'"></span>
                </button>
                <button class="ctrl-btn" @click="cmd(dev, 'volume down the ' + dev.name)">Vol-</button>
                <button class="ctrl-btn" @click="cmd(dev, 'volume up the ' + dev.name)">Vol+</button>
                <button class="ctrl-btn" @click="cmd(dev, (dev.haState?.state === 'playing' ? 'pause' : 'play') + ' the ' + dev.name)">
                  <span x-text="dev.haState?.state === 'playing' ? '⏸' : '▶'"></span>
                </button>
              </div>
            </template>

            <!-- fan.* -->
            <template x-if="dev.domain === 'fan'">
              <div class="widget-fan">
                <button class="ctrl-btn wide" @click="cmd(dev, 'turn ' + (dev.haState?.state === 'on' ? 'off' : 'on') + ' the ' + dev.name)">
                  <span x-text="dev.haState?.state === 'on' ? 'On' : 'Off'"></span>
                </button>
                <div class="mode-chips">
                  <template x-for="mode in ['auto','low','medium','high','sleep']" :key="mode">
                    <button class="mode-chip"
                      :class="{ active: (dev.haState?.attributes?.preset_mode ?? '').toLowerCase() === mode }"
                      @click="cmd(dev, 'set ' + dev.name + ' to ' + mode + ' mode')"
                      x-text="mode"></button>
                  </template>
                </div>
              </div>
            </template>

            <!-- light.* -->
            <template x-if="dev.domain === 'light'">
              <div class="widget-light">
                <button class="ctrl-btn wide" @click="cmd(dev, 'turn ' + (dev.haState?.state === 'on' ? 'off' : 'on') + ' the ' + dev.name)">
                  <span x-text="dev.haState?.state === 'on' ? 'On' : 'Off'"></span>
                </button>
                <input type="range" min="0" max="100" class="volume-slider"
                  :value="Math.round((dev.haState?.attributes?.brightness ?? 0) / 2.55)"
                  @change="cmd(dev, 'set ' + dev.name + ' brightness to ' + $event.target.value + '%')">
              </div>
            </template>

            <!-- sensor.* — read-only -->
            <template x-if="dev.domain === 'sensor'">
              <div class="widget-sensor">
                <span class="sensor-val" x-text="dev.haState?.state ?? '—'"></span>
                <span class="sensor-unit" x-text="dev.haState?.attributes?.unit_of_measurement ?? ''"></span>
              </div>
            </template>

            <!-- switch.* or SmartThings -->
            <template x-if="dev.domain === 'switch' || dev.domain === 'smartthings'">
              <div class="widget-row">
                <button class="ctrl-btn wide" @click="cmd(dev, 'turn ' + (dev.haState?.state === 'on' ? 'off' : 'on') + ' the ' + dev.name)">
                  <span x-text="dev.haState?.state === 'on' ? 'On' : 'Off'"></span>
                </button>
              </div>
            </template>

            <!-- unknown domains — simple on/off -->
            <template x-if="!['climate','media_player','fan','light','sensor','switch','smartthings'].includes(dev.domain)">
              <div class="widget-row">
                <button class="ctrl-btn" @click="cmd(dev, 'turn on the ' + dev.name)">On</button>
                <button class="ctrl-btn" @click="cmd(dev, 'turn off the ' + dev.name)">Off</button>
              </div>
            </template>

            <!-- state badge -->
            <div class="dev-state" x-text="dev.haState?.state ?? (dev.domain === 'smartthings' ? '' : 'unavailable')"></div>
          </div>
        </template>

        <template x-if="filteredDevices.length === 0">
          <div class="no-tiles">No devices — add them via Discord</div>
        </template>
      </div>
    </section>

    <!-- Media tab -->
    <section x-show="tab === 'media'" class="screen-media">

      <!-- YouTube search -->
      <div class="yt-search-row">
        <input class="yt-search-input" type="text" placeholder="Search YouTube…"
          x-model="ytQuery"
          @keydown.enter="searchYouTube()">
        <button class="yt-search-btn" @click="searchYouTube()" :disabled="ytSearching">
          <span x-text="ytSearching ? '…' : 'Go'"></span>
        </button>
      </div>

      <!-- Search results -->
      <template x-if="ytResults.length > 0">
        <div class="yt-results">
          <template x-for="v in ytResults" :key="v.id">
            <div class="yt-result">
              <img class="yt-thumb" :src="v.thumbnail" :alt="v.title" loading="lazy">
              <div class="yt-info">
                <div class="yt-title" x-text="v.title"></div>
              </div>
              <div class="yt-actions">
                <button class="yt-btn yt-play-btn" @click="playYtResult(v)" title="Play audio on Pi">▶</button>
                <button class="yt-btn yt-watch-btn" @click="watchYtResult(v.id)" title="Watch in browser">Watch</button>
              </div>
            </div>
          </template>
        </div>
      </template>

      <!-- Now playing bar -->
      <div class="now-playing" x-show="nowPlaying">
        <div class="np-info">
          <span class="np-title" x-text="nowPlaying?.title ?? nowPlaying?.source ?? '—'"></span>
        </div>
        <span class="np-state">▶ playing</span>
      </div>
      <div class="now-playing now-playing--empty" x-show="!nowPlaying">
        <span class="np-title">Nothing playing</span>
      </div>

      <!-- Volume slider -->
      <div class="media-title">Volume</div>
      <div class="volume-row">
        <button class="vol-btn" @click="adjustVolume(-10)">−</button>
        <input
          class="volume-slider"
          type="range" min="0" max="100" step="1"
          x-model.number="volume"
          @change="setVolume(volume)"
        >
        <button class="vol-btn" @click="adjustVolume(+10)">+</button>
        <span class="vol-label" x-text="volume + '%'"></span>
      </div>

      <div class="media-actions">
        <button class="media-btn stop-btn" @click="stopSound()">&#9632; Stop all</button>
      </div>

      <!-- Shortcuts -->
      <div class="media-title">Shortcuts</div>
      <div class="shortcuts-grid">
        <template x-for="sc in shortcuts" :key="sc.name">
          <button class="shortcut-tile" @click="playYtResult({ url: sc.url, title: sc.name })">
            <span class="sc-icon">▶</span>
            <span class="sc-name" x-text="sc.name"></span>
          </button>
        </template>
        <template x-if="shortcuts.length === 0">
          <div class="no-tiles" style="grid-column:1/-1">No shortcuts — say: "save shortcut lofi &lt;url&gt;"</div>
        </template>
      </div>
    </section>

    <!-- Weather tab -->
    <section x-show="tab === 'weather'" class="screen-weather">
      <template x-if="weather">
        <div class="weather-wrap" @click="openWeatherOverlay()" title="Tap for full forecast">
          <!-- Current conditions -->
          <div class="weather-current">
            <div class="weather-main">
              <img class="weather-icon" :src="'https://openweathermap.org/img/wn/' + weather.icon + '@2x.png'" :alt="weather.description">
              <div class="weather-temp-block">
                <span class="weather-temp" x-text="weather.temp + '°'"></span>
                <span class="weather-city" x-text="weather.city"></span>
              </div>
            </div>
            <div class="weather-details">
              <span x-text="weather.description" style="text-transform:capitalize"></span>
              <span x-text="'Feels ' + weather.feelsLike + '°'"></span>
              <span x-text="'Humidity ' + weather.humidity + '%'"></span>
            </div>
          </div>

          <!-- 3-day forecast -->
          <div class="forecast-row">
            <template x-for="day in weather.forecast" :key="day.date">
              <div class="forecast-tile">
                <span class="fc-day" x-text="day.date"></span>
                <img class="fc-icon" :src="'https://openweathermap.org/img/wn/' + day.icon + '.png'" :alt="day.description">
                <span class="fc-range" x-text="day.tempMax + '° / ' + day.tempMin + '°'"></span>
              </div>
            </template>
          </div>
        </div>
      </template>

      <template x-if="!weather && weatherError">
        <div class="placeholder-text" x-text="weatherError"></div>
      </template>

      <template x-if="!weather && !weatherError">
        <div class="placeholder-text">Set WEATHER_API_KEY, WEATHER_LAT, WEATHER_LON to enable</div>
      </template>
    </section>

    <!-- Chat tab -->
    <section x-show="tab === 'chat'" class="screen-chat">
      <div class="chat-messages" x-ref="chatList">
        <template x-if="messages.length === 0">
          <div class="chat-hint">Say something or type a command below</div>
        </template>
        <template x-for="msg in messages" :key="msg.id">
          <div class="chat-bubble" :class="msg.source">
            <span x-text="msg.text"></span>
          </div>
        </template>
      </div>

      <!-- Mic recording indicator -->
      <div class="mic-recording" x-show="micRecording" x-cloak>
        <span class="mic-dot"></span> Listening…
      </div>

      <div class="chat-input-row">
        <button
          class="mic-btn"
          :class="{ active: micRecording }"
          @click="toggleMic()"
          title="Voice input"
        >Mic</button>
        <input
          class="chat-input"
          type="text"
          placeholder="Type a command…"
          x-model="chatInput"
          @keydown.enter="submitChat()"
        >
        <button class="chat-send" @click="submitChat()">Send</button>
      </div>
    </section>

  </main>

  <!-- ── Bottom nav ─────────────────────────────────────────────────────────── -->
  <nav class="bottom-nav">
    <button class="nav-btn" :class="{ active: tab === 'home' }"    @click="tab = 'home'">Home</button>
    <button class="nav-btn" :class="{ active: tab === 'devices' }" @click="tab = 'devices'">Devices</button>
    <button class="nav-btn" :class="{ active: tab === 'media' }"   @click="tab = 'media'">Media</button>
    <button class="nav-btn" :class="{ active: tab === 'weather' }" @click="tab = 'weather'">Weather</button>
    <button class="nav-btn" :class="{ active: tab === 'chat' }"    @click="tab = 'chat'">Chat</button>
  </nav>

  <!-- ── YouTube iframe overlay ────────────────────────────────────────────── -->
  <div class="yt-overlay" x-show="ytIframe !== null" x-cloak>
    <div class="yt-overlay-bar">
      <span class="yt-overlay-title" x-text="ytResults.find(v => v.id === ytIframe)?.title ?? 'YouTube'"></span>
      <button class="yt-close-btn" @click="closeIframe()">✕</button>
    </div>
    <template x-if="ytIframe">
      <iframe
        class="yt-iframe"
        :src="'https://www.youtube.com/embed/' + ytIframe + '?autoplay=1&rel=0'"
        allow="autoplay; encrypted-media; fullscreen"
        allowfullscreen
      ></iframe>
    </template>
  </div>

  <!-- ── Weather overlay (Windy) ──────────────────────────────────────────── -->
  <div class="weather-overlay" x-show="weatherOverlay" x-cloak>
    <div class="weather-overlay-bar">
      <span class="weather-overlay-title" x-text="'Weather — ' + (weather?.city ?? '')"></span>
      <button class="weather-close-btn" @click="closeWeatherOverlay()">✕</button>
    </div>
    <template x-if="weatherOverlay && weather">
      <iframe
        class="weather-iframe"
        :src="weather.windyUrl"
        allowfullscreen
      ></iframe>
    </template>
  </div>

  <!-- ── Idle slideshow overlay ─────────────────────────────────────────────── -->
  <div class="idle-overlay" x-show="idle" @click="wakeUp()" x-cloak>
    <template x-if="photos.length > 0">
      <img class="idle-photo" :src="'/photo/' + photos[slideIndex]" alt="">
    </template>
    <div class="idle-info">
      <div class="idle-clock" x-text="clock"></div>
      <div class="idle-date"  x-text="date"></div>
    </div>
  </div>

</body>
</html>
